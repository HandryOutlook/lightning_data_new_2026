name: Update Summer 2026 Lightning Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lightning-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run lightning updater
        run: python scripts/update_lightning_summer.py

      - name: Commit updated lightning data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add lightning_data_2026_summer.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Append missing Summer 2026 lightning strikes"
            git push
          fi
